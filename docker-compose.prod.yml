# =============================================================================
# Axy Web - Production Docker Compose
# Uses pre-built images from GitHub Container Registry
#
# Deploy:
#   curl -fsSL https://raw.githubusercontent.com/Axy-Project/axy-claude-cli-web/main/docker-compose.prod.yml -o docker-compose.yml
#   cp .env.example .env  # edit with your keys
#   docker compose up -d
#
# Update:
#   docker compose pull && docker compose up -d
#
# Auto-update (with Watchtower):
#   Already included - checks every 5 minutes
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: axy
      POSTGRES_USER: ${DB_USER:-axy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-axy} -d axy"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/axy-project/axyweb-server:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER:-axy}:${DB_PASSWORD}@db:5432/axy
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      PROJECTS_DIR: /data/projects
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - projects:/data/projects
    ports:
      - "${SERVER_PORT:-3456}:3456"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  web:
    image: ghcr.io/axy-project/axyweb-web:latest
    restart: unless-stopped
    depends_on:
      - server
    environment:
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3457}:3457"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Auto-updater: pulls new images every 5 minutes and recreates containers
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:
  projects:
