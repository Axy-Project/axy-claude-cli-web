# =============================================================================
# Axy Web - Docker Compose (build from source)
# For pre-built images, use docker-compose.prod.yml instead
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: axy
      POSTGRES_USER: ${DB_USER:-axy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-axy} -d axy"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER:-axy}:${DB_PASSWORD}@db:5432/axy
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      PROJECTS_DIR: /data/projects
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - projects:/data/projects
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${SERVER_PORT:-3456}:3456"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    environment:
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3457}:3457"

volumes:
  pgdata:
  projects:
